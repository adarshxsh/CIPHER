version: "3.9"

services:
  relay:
    build: .
    container_name: relay
    command: ["./relay", "-listen", "9002"]
    ports:
      - "9002:9002"
    volumes:
      - ./data/relay:/app/data

  peer1:
    build: .
    container_name: peer1
    command: ["./peer", "-listen", "9000", "-key", "/app/data/identity.key", "-relay", "/dns4/relay/tcp/9002/p2p/RELAY_ID_PLACEHOLDER"]
    ports:
      - "9000:9000"
    depends_on:
      - relay
    volumes:
      - ./data/peer1:/app/data

  peer2:
    build: .
    container_name: peer2
    command: ["./peer", "-listen", "9001", "-key", "/app/data/identity.key", "-relay", "/dns4/relay/tcp/9002/p2p/RELAY_ID_PLACEHOLDER", "-target", "/dns4/peer1/tcp/9000/p2p/PEER1_ID_PLACEHOLDER"]
    ports:
      - "9001:9001"
    depends_on:
      - relay
      - peer1
    volumes:
      - ./data/peer2:/app/data
