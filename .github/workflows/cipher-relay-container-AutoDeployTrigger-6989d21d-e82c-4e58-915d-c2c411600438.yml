name: Trigger auto deployment for cipher-relay-container

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cipher-relay-container-AutoDeployTrigger-6989d21d-e82c-4e58-915d-c2c411600438.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CIPHERRELAYCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CIPHERRELAYCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CIPHERRELAYCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}Adarsh/p2p_transport/DockerfileRelay
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cipherregistry1.azurecr.io
          registryUsername: ${{ secrets.CIPHERRELAYCONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CIPHERRELAYCONTAINER_REGISTRY_PASSWORD }}
          containerAppName: cipher-relay-container
          resourceGroup: Cipher_group
          imageToBuild: cipherregistry1.azurecr.io/cipher-relay-container:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


